name: Docker Build and Push

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push API Gateway
      uses: docker/build-push-action@v4
      with:
        context: ./api-gateway
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/snowrepo-api-gateway:latest
          ${{ secrets.DOCKER_USERNAME }}/snowrepo-api-gateway:${{ github.sha }}

    - name: Build and push Shared Libraries
      uses: docker/build-push-action@v4
      with:
        context: ./shared-domain
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/snowrepo-shared-libs:latest
          ${{ secrets.DOCKER_USERNAME }}/snowrepo-shared-libs:${{ github.sha }}
