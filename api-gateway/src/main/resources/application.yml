spring:
  application:
    name: api-gateway
  main:
    allow-bean-definition-overriding: true
    web-application-type: reactive
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: itsm-service
          uri: http://localhost:8016
          predicates:
            - Path=/api/v1/incidents/**
        - id: cmdb-service
          uri: http://localhost:8015
          predicates:
            - Path=/api/v1/cis/**
        - id: itom-service
          uri: http://localhost:8018
          predicates:
            - Path=/api/v1/assets/**
        - id: itam-service
          uri: http://localhost:8017
          predicates:
            - Path=/api/v1/assets/**
        - id: auth-service
          uri: http://localhost:8016
          predicates:
            - Path=/api/v1/auth/**
        - id: problems-service
          uri: http://localhost:8016
          predicates:
            - Path=/api/v1/problems/**
        - id: changes-service
          uri: http://localhost:8016
          predicates:
            - Path=/api/v1/changes/**
        - id: requests-service
          uri: http://localhost:8016
          predicates:
            - Path=/api/v1/requests/**
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/auth/realms/snowrepo
          jwk-set-uri: http://localhost:8081/auth/realms/snowrepo/protocol/openid-connect/certs

server:
  port: 8089

jwt:
  secret: snowrepo-secret-key-for-jwt-token-generation-and-validation
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
