spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: incident-service
          uri: http://incident-service:8080
          predicates:
            - Path=/api/incidents/**
        - id: user-service
          uri: http://user-service:8080
          predicates:
            - Path=/api/users/**
        - id: cmdb-service
          uri: http://cmdb-service:8080
          predicates:
            - Path=/api/cmdb/**
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/auth/realms/snowrepo
          jwk-set-uri: http://localhost:8081/auth/realms/snowrepo/protocol/openid-connect/certs

server:
  port: 8080

jwt:
  secret: snowrepo-secret-key-for-jwt-token-generation-and-validation
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
